<!DOCTYPE html>
<html lan="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../report.css" type="text/css" rel="stylesheet">
</head>

<body>
    <div class="banner">
        <table width="98%">
            <tr>
                <td>
                    <h2 class="banner">QUALIDADES</h2>
                </td>
            </tr>
        </table>
    </div>
    <br />
    <div>
        <div>
            <div class="currentmasterreport">
                <table>
                    <tr>
                        <th>TABLE_COMMENT</th>
                        <td data-i18n="qal_table_comment">Tabela com as qualidades dos produtos</td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <th>COLUMN_NAME</th>
                        <th>DATA_TYPE</th>
                        <th>NULLABLE</th>
                        <th>DATA_DEFAULT</th>
                        <th>COLUMN_ID</th>
                        <th>COMMENTS</th>
                    </tr>
                    <tr>
                        <td>QAL_ID</td>
                        <td>NUMBER(6,0)</td>
                        <td>No</td>
                        <td>null</td>
                        <td>1</td>
                        <td data-i18n="qal_id_comment">Chave primária, identificador único da qualidade</td>
                    </tr>
                    <tr>
                        <td>QAL_NOME</td>
                        <td>VARCHAR2(255 BYTE)</td>
                        <td>No</td>
                        <td>null</td>
                        <td>2</td>
                        <td data-i18n="qal_nome_comment">Termo para indicar a qualidade do produto</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <div id="lang-switch">
        <button onclick="loadLanguage('en')">
            en
        </button>
        <button onclick="loadLanguage('ptbr')">
            pt-br
        </button>
    </div>
    <script src="../language.js"></script>
    <script id="en" type="application/json">
        {
            "qal_table_comment": "Table containing product qualities",
            "qal_id_comment": "Primary key, unique identifier of the quality",
            "qal_nome_comment": "Term used to indicate product quality"
        }
    </script>
    <script id="ptbr" type="application/json">
        {
            "qal_table_comment": "Tabela com as qualidades dos produtos",
            "qal_id_comment": "Chave primária, identificador único da qualidade",
            "qal_nome_comment": "Termo para indicar a qualidade do produto" 
        }
    </script>
</body>

</html>
