<!DOCTYPE html>
<html lan="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../report.css" type="text/css" rel="stylesheet">
</head>

<body>
    <div class="banner">
        <table width="98%">
            <tr>
                <td>
                    <h2 class="banner">PRODUTOS</h2>
                </td>
            </tr>
        </table>
    </div>
    <br />
    <div>
        <div>
            <div class="currentmasterreport">
                <table>
                    <tr>
                        <th>TABLE_COMMENT</th>
                        <td data-i18n="pdt_table_comment">Tabela com os produtos</td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <th>COLUMN_NAME</th>
                        <th>DATA_TYPE</th>
                        <th>NULLABLE</th>
                        <th>DATA_DEFAULT</th>
                        <th>COLUMN_ID</th>
                        <th>COMMENTS</th>
                    </tr>
                    <tr>
                        <td>PDT_ID</td>
                        <td>NUMBER(6,0)</td>
                        <td>No</td>
                        <td>null</td>
                        <td>1</td>
                        <td data-i18n="pdt_id_comment">Chave primária, identificador único do produto</td>
                    </tr>
                    <tr>
                        <td>PDT_NOME</td>
                        <td>VARCHAR2(255 BYTE)</td>
                        <td>No</td>
                        <td>null</td>
                        <td>2</td>
                        <td data-i18n="pdt_nome_comment">Nome do produto</td>
                    </tr>
                    <tr>
                        <td>PDT_PRECO</td>
                        <td>NUMBER(4,2)</td>
                        <td>No</td>
                        <td>null</td>
                        <td>3</td>
                        <td data-i18n="pdt_preco_comment">Preço unitário do produto</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    </div>
    <div id="lang-switch">
        <button onclick="loadLanguage('en')">
            en
        </button>
        <button onclick="loadLanguage('ptbr')">
            pt-br
        </button>
    </div>
    <script src="../language.js"></script>
    <script id="en" type="application/json">
        {
            "pdt_table_comment": "Table containing products",
            "pdt_id_comment": "Primary key, unique identifier of the product",
            "pdt_nome_comment": "Product name",
            "pdt_preco_comment": "Unit price of the product"
        }
    </script>
    <script id="ptbr" type="application/json">
        {
            "pdt_table_comment": "Tabela com os produtos",
            "pdt_id_comment": "Chave primária, identificador único do produto",
            "pdt_nome_comment": "Nome do produto",
            "pdt_preco_comment": "Preço unitário do produto" 
        }
    </script>
</body>

</html>
